services:
  backend:
    build: ./backend
    environment:
      DB_PATH: /data/spotwise.db
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      ENTSOE_API_TOKEN: ${ENTSOE_API_TOKEN:-}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-*}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}
    volumes:
      - spotwise_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m

volumes:
  spotwise_data:
